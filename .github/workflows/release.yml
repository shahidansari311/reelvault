name: Build Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # ✅ FIX 403

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm install

      - name: Build APK
        run: eas build -p android --profile preview --non-interactive

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ReelVault ${{ github.ref_name }}
          body: |
            ✅ APK build started successfully!

            📥 Download APK from:
            https://expo.dev/accounts/shahid310/projects/reelvault/builds
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
